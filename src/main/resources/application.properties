server.port=8083
# Konfigurasi Database PostgresSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=mbkm_app
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Config
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Max file size.
spring.servlet.multipart.max-file-size=20MB
# Max Request Size
spring.servlet.multipart.max-request-size=20MB

tokenExpiredHours=24

spring.security.user.name=user
spring.security.user.password=password

# time expired jwt
jwtSecret=superSecretKeyIsTooShortAndWeNeedALongerOneForHS512AlgorithmToWorkCorrectly
jwtExpirationMs=86400000

logging.level.root=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%-5level] %logger{40} : %msg%n

spring.mail.host=smtp.gmail.com
spring.mail.port=587
